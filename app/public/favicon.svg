<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- DNA strand 2 (cyan, drawn first so teal strand sits on top at crossing) -->
  <path d="M28 4C14 4 14 14 16 16C18 18 18 28 4 28"
        stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <!-- DNA strand 1 (teal) -->
  <path d="M4 4C18 4 18 14 16 16C14 18 14 28 28 28"
        stroke="#0d9488" stroke-width="3" stroke-linecap="round"/>
  <!-- Match indicator at crossing point -->
  <circle cx="16" cy="16" r="4.5" fill="#0d9488"/>
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
